<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="605" viewBox="0 0 1760 605" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="30" font-size="16" font-weight="500" fill="#2C2C2A">BPMN — buyer brief → concierge matching → lead → outcome (V1)</text>

  <rect x="30" y="48" width="1700" height="520" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="30" y1="221" x2="1730" y2="221" stroke="#D3D1C7" stroke-width="1"/>
  <line x1="30" y1="394" x2="1730" y2="394" stroke="#D3D1C7" stroke-width="1"/>
  <text x="46" y="70" font-size="13" font-weight="500" fill="#5F5E5A">Buyer</text>
  <text x="46" y="243" font-size="13" font-weight="500" fill="#5F5E5A">Admin / Concierge</text>
  <text x="46" y="416" font-size="13" font-weight="500" fill="#5F5E5A">Xưởng</text>

  <!-- ================= FLOWS (drawn first, under nodes) ================= -->
  <!-- F1 start -> review -->
  <path d="M165,134 L335,134 L335,279" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F2 review -> gateway info -->
  <path d="M394,307 L437,307" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F3 gateway info (Khong) -> addinfo -->
  <path d="M465,279 L465,75 L250,75 L250,106" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="479" y="255" font-size="12" fill="#5F5E5A">Không</text>
  <!-- F4 addinfo -> review (loop) -->
  <path d="M250,162 L250,200 L305,200 L305,279" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F5 gateway info (Co) -> shortlist -->
  <path d="M493,307 L541,307" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="517" y="296" font-size="12" fill="#5F5E5A">Có · qualified</text>
  <!-- F6 shortlist -> send -->
  <path d="M689,307 L711,307" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F7 send -> view -->
  <path d="M785,335 L785,420 L955,420 L955,453" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F8 view -> gateway resp -->
  <path d="M1029,481 L1067,481" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F9 gateway resp (Khong) -> expired -->
  <path d="M1095,509 L1095,535" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1109" y="524" font-size="12" fill="#5F5E5A">Không</text>
  <!-- F10 gateway resp (Co) -> respond+quote -->
  <path d="M1123,481 L1176,481" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1140" y="470" font-size="12" fill="#5F5E5A">Có</text>
  <!-- F11 respond+quote -> sample -->
  <path d="M1324,481 L1346,481" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F12 sample -> outcome -->
  <path d="M1420,453 L1420,240 L1575,240 L1575,279" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F13 outcome -> end -->
  <path d="M1649,307 L1690,307" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- F14 feedback outcome -> shortlist (dashed) -->
  <path d="M1575,335 L1575,370 L615,370 L615,335" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="1095" y="364" font-size="12" fill="#BA7517" text-anchor="middle">outcome cải thiện matching lần sau</text>

  <!-- ================= NODES ================= -->
  <!-- S1 start -->
  <circle cx="145" cy="134" r="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.2"/>
  <text x="145" y="134" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Brief</text>
  <text x="145" y="171" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">submitted</text>

  <!-- addinfo -->
  <rect x="185" y="106" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text x="250" y="126" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Bổ sung</text>
  <text x="250" y="144" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">thông tin brief</text>
  <text x="250" y="95" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">needs_information</text>

  <!-- review -->
  <rect x="246" y="279" width="148" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text x="320" y="299" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Review brief</text>
  <text x="320" y="317" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">admin qualify</text>
  <text x="320" y="349" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">reviewed</text>

  <!-- gateway info -->
  <polygon points="465,279 493,307 465,335 437,307" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="465" y="307" font-size="11" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Đủ tin?</text>

  <!-- shortlist (moat) -->
  <rect x="541" y="279" width="148" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.1"/>
  <text x="615" y="299" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#633806">★ Shortlist 3–5 xưởng</text>
  <text x="615" y="317" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#854F0B">kèm lý do match</text>
  <text x="615" y="349" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">shortlisted</text>

  <!-- send -->
  <rect x="711" y="279" width="148" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text x="785" y="299" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Gửi lead</text>
  <text x="785" y="317" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">link riêng từng xưởng</text>
  <text x="785" y="349" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">sent</text>

  <!-- view -->
  <rect x="881" y="453" width="148" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text x="955" y="473" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Mở link lead</text>
  <text x="955" y="491" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">hệ thống ghi nhận</text>
  <text x="955" y="523" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">viewed</text>

  <!-- gateway resp -->
  <polygon points="1095,453 1123,481 1095,509 1067,481" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="1095" y="481" font-size="11" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Phản hồi?</text>

  <!-- expired -->
  <circle cx="1095" cy="548" r="13" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="2"/>
  <text x="1116" y="548" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" dominant-baseline="central" fill="#888780">expired / no_response</text>

  <!-- respond + quote -->
  <rect x="1176" y="453" width="148" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text x="1250" y="473" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Phản hồi &amp; báo giá</text>
  <text x="1250" y="491" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">trao đổi với buyer</text>
  <text x="1250" y="523" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">responded → quoted</text>

  <!-- sample -->
  <rect x="1346" y="453" width="148" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
  <text x="1420" y="481" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Làm mẫu</text>
  <text x="1420" y="523" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">sample_started</text>

  <!-- outcome (moat) -->
  <rect x="1501" y="279" width="148" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.1"/>
  <text x="1575" y="299" font-size="13" text-anchor="middle" dominant-baseline="central" fill="#633806">★ Ghi nhận outcome</text>
  <text x="1575" y="317" font-size="12" text-anchor="middle" dominant-baseline="central" fill="#854F0B">+ lost reason</text>
  <text x="1575" y="349" font-size="11" font-family="ui-monospace,Menlo,Consolas,monospace" text-anchor="middle" fill="#888780">won / lost</text>

  <!-- end -->
  <circle cx="1710" cy="307" r="20" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="2.5"/>
  <text x="1710" y="307" font-size="11" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Hoàn tất</text>

  <!-- legend -->
  <rect x="30" y="582" width="14" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="50" y="588" font-size="12" dominant-baseline="central" fill="#5F5E5A">★ Lớp tạo lợi thế khó sao chép — curated matching (có lý do) + outcome data (vòng hồi tiếp)</text>
</svg>
